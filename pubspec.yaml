name: flutter_base_kit
description: "A Flutter Base Kit."
publish_to: 'none' 
version: 1.0.0+1


environment:
  sdk: ^3.5.1


dependencies:
  flutter:
    sdk: flutter

  # Data
  dio: ^5.7.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  shared_preferences: ^2.2.0

  # Device
  package_info_plus: ^8.1.1

  # Formatting and Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0

  # Loading
  flutter_easyloading: ^3.0.5

  # Routing
  go_router: ^7.1.1

  # State Management
  provider: ^6.1.2

dev_dependencies:
  build_runner: ^2.4.13
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  freezed: ^2.5.7
  json_serializable: ^6.9.0


flutter:
  generate: true
  uses-material-design: true

  assets:
    - lib/app/assets/images/flutter.png
    - lib/app/assets/images/mit-license.png
    - lib/app/assets/images/mvvm-structure.png

  fonts:
    - family: Quicksand
      fonts:
        - asset: fonts/quicksand/Quicksand-Light.ttf
          weight: 300
        - asset: fonts/quicksand/Quicksand-Regular.ttf
          weight: 400
        - asset: fonts/quicksand/Quicksand-Medium.ttf
          weight: 500
        - asset: fonts/quicksand/Quicksand-SemiBold.ttf
          weight: 600
        - asset: fonts/quicksand/Quicksand-Bold.ttf
          weight: 700

flutter_intl:
        enabled: true